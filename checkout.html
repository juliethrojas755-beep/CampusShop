<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CampusShop - Checkout</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/responsive.css">
</head>

<body>

 <main class="checkout-app">

  <div class="checkout-card">

    <!-- HEADER -->
    <div class="checkout-header">
      <i class="fas fa-arrow-left"></i>
      <h3>Checkout</h3>
    </div>

    <!-- ENVÍO -->
    <h4>Envío</h4>

    <div class="formulario">
      <input type="text" placeholder="Ingresa tu nombre completo">
      <input type="text" placeholder="Ingresa tu dirección">
      <input type="text" placeholder="Tu ciudad">
    </div>

    <!-- MÉTODO DE PAGO -->
    <h4>Método de Pago</h4>

    <div class="metodos">
      <div class="metodo activo">
        <i class="fas fa-credit-card"></i>
        <p>Bancolombia</p>
      </div>

      <div class="metodo">
        <i class="fas fa-credit-card"></i>
        <p>Efectivo </p>
      </div>

      <div class="metodo">
        <i class="fas fa-wallet"></i>
        <p>Paypal</p>
      </div>
    </div>

    <!-- RESUMEN -->
    <div class="resumen">
      <h5>Resumen de tu Orden</h5>

      <div class="item">
        <img src="img/zapatos1.webp">
        <div>
          <p>Zapatillas Deportivas</p>
          <small>Cantidad: 1</small>
        </div>
        <span>$120.000</span>
      </div>

      <div class="item">
        <img src="img/pantalon1.webp">
        <div>
          <p>Pantalon casual</p>
          <small>Cantidad: 1</small>
        </div>
        <span>$230.000</span>
      </div>

      <div class="total">
        <p>Total</p>
        <strong>$350.000</strong>
      </div>
    </div>

    <!-- BOTÓN -->
    <button class="btn-pagar">350.000</button>

  </div>
 </main>
</body>
</html>
