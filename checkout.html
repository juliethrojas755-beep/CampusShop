<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CampusShop - Checkout</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/responsive.css">
</head>

<body>

<main class="checkout-container">

<!-- SIDEBAR -->
<aside class="sidebar">
<h2>CampusShop</h2>

<ul>
<li><i class="fas fa-border-all"></i> Todos</li>
<li><i class="fas fa-shirt"></i> Blusas</li>
<li><i class="fas fa-user"></i> Pantalones</li>
<li><i class="fas fa-shoe-prints"></i> Zapatillas</li>
<li><i class="fas fa-bag-shopping"></i> Accesorios</li>
<li><i class="fas fa-cart-shopping"></i> Carrito</li>
</ul>
</aside>

<!-- CONTENIDO -->
<section class="checkout-content">

<h2>Finalizar compra</h2>

<div class="checkout-grid">

<!-- FORMULARIO -->
<form class="formulario">

<h3>Datos de envío</h3>

<input type="text" placeholder="Nombre completo">
<input type="text" placeholder="Dirección">
<input type="text" placeholder="Ciudad">
<input type="tel" placeholder="Teléfono">

<h3>Método de pago</h3>

<input type="text" placeholder="Número de tarjeta">
<input type="text" placeholder="Nombre en la tarjeta">

<div class="fila-doble">
<input type="text" placeholder="MM/AA">
<input type="text" placeholder="CVV">
</div>

<button class="btn-pagar">Pagar ahora</button>

</form>

<!-- RESUMEN -->
<div class="resumen-checkout">

<h3>Resumen</h3>

<p>Blusa Elegante - $65.000</p>
<p>Pantalón Casual - $89.000</p>

<hr>

<h4>Total: $154.000</h4>

</div>

</div>

</section>

</main>

</body>
</html>
