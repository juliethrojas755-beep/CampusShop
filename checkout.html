<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CampusShop - Checkout</title>




<link rel="stylesheet" href="css/base.css">

<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/responsive.css">
</head>

<body>

<div class="phone">

    <header class="header">
        <h2>Checkout</h2>
    </header>

    <section class="resumen">
        <h3>Resumen del pedido</h3>

       <div class="item">
    <div class="info">
        <img src="img/zapatos1.webp" alt="Zapatillas">
        <span>Zapatillas</span>
    </div>
    <span>$520.000</span>
</div>

<div class="item">
    <div class="info">
        <img src="img/pantalon1.webp" alt="Pantalón">
        <span>Pantalón</span>
    </div>
    <span>$230.000</span>
</div>
        <h3 class="total">Total: $750.000</h3>
    </section>

    <form action="confirmacion.html" method="GET">

        <h3>Datos del cliente</h3>

        <input type="text" name="nombre" placeholder="Nombre completo" required>

        <input type="text" name="direccion" placeholder="Dirección" required>

        <input type="text" name="telefono" placeholder="Teléfono" required>

        <h3>Método de pago</h3>

<div class="metodos">
    <label>
        <input type="radio" name="pago" required>
        💳 Tarjeta
    </label>

    <label>
        <input type="radio" name="pago">
        📱 Nequi
    </label>

    <label>
        <input type="radio" name="pago">
        💵 Efectivo
    </label>
</div>

        <button type="submit">Pagar ahora</button>

    </form>

</div>

</body>
</html>
