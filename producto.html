<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CampusShop - Producto</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/responsive.css">
</head>

<body>

<main class="producto-container">

<!-- SIDEBAR -->
<aside class="sidebar">
<h2>CampusShop</h2>

<ul>
<li><i class="fas fa-border-all"></i> Todos</li>
<li><i class="fas fa-shirt"></i> Blusas</li>
<li><i class="fas fa-user"></i> Pantalones</li>
<li><i class="fas fa-shoe-prints"></i> Zapatillas</li>
<li><i class="fas fa-bag-shopping"></i> Accesorios</li>
<li class="activo"><i class="fas fa-cart-shopping"></i> Carrito</li>
</ul>
</aside>

<!-- CONTENIDO -->
<section class="producto-content">

<div class="producto-detalle">

<!-- IMAGEN -->
<div class="producto-img">
<img src="img/blusa1.jpeg" alt="Producto">
</div>

<!-- INFO -->
<div class="producto-info">

<h2>Blusa Elegante</h2>

<p class="precio">$65.000</p>

<p class="descripcion">
Blusa moderna ideal para uso diario, cómoda y elegante para cualquier ocasión.
</p>

<div class="tags">
<span>NUEVO</span>
<span>MODA</span>
</div>

<button class="btn-carrito">Agregar al carrito</button>

</div>

</div>

<!-- RELACIONADOS -->
<h3>Productos relacionados</h3>

<div class="productos-grid">

<article class="card">
<img src="img/pantalon1.jpeg">
<h3>Pantalón Casual</h3>
<p>$89.000</p>
</article>

<article class="card">
<img src="img/zapatos1.jpeg">
<h3>Zapatillas</h3>
<p>$120.000</p>
</article>

</div>

</section>

</main>

</body>
</html>
