<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CampusShop - Carrito</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/responsive.css">
</head>

<body>

<main class="carrito-container">

<!-- SIDEBAR -->
<aside class="sidebar">
<h2>CampusShop</h2>

<ul>
<li><i class="fas fa-border-all"></i> Todos</li>
<li><i class="fas fa-shirt"></i> Blusas</li>
<li><i class="fas fa-user"></i> Pantalones</li>
<li><i class="fas fa-shoe-prints"></i> Zapatillas</li>
<li><i class="fas fa-bag-shopping"></i> Accesorios</li>
<li class="activo"><i class="fas fa-cart-shopping"></i> Carrito</li>
</ul>
</aside>

<!-- CONTENIDO -->
<section class="carrito-content">

<h2>Carrito de compras</h2>

<div class="tabla-carrito">

<div class="fila encabezado">
<span>Producto</span>
<span>Precio</span>
<span>Cantidad</span>
<span>Total</span>
</div>

<div class="fila">
<span>Blusa Elegante</span>
<span>$65.000</span>
<span>1</span>
<span>$65.000</span>
</div>

<div class="fila">
<span>Pantalón Casual</span>
<span>$89.000</span>
<span>1</span>
<span>$89.000</span>
</div>

</div>

<!-- RESUMEN -->
<div class="resumen">

<p>Subtotal: $154.000</p>
<p>Envío: Gratis</p>
<h3>Total: $154.000</h3>

<button class="btn-checkout">Ir a pagar</button>

</div>

</section>

</main>

</body>
</html>
