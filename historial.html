<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historial - CampusShop</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/responsive.css">
</head>

<body>

<main class="historial-app">

  <div class="historial-card">

    <!-- HEADER -->
    <div class="historial-header">
      <i class="fas fa-arrow-left"></i>
      <h3>Historial de Pedidos</h3>
    </div>

    <!-- PEDIDO 1 -->
    <div class="pedido">
      <div class="pedido-info">
        <h4>Orden #12345</h4>
        <p>15 Oct, 2023</p>
        <span class="estado entregado">Entregado</span>
      </div>

      <div class="pedido-derecha">
        <p class="precio">$125.50</p>
        <button>Ver detalle</button>
      </div>
    </div>

    <!-- PEDIDO 2 -->
    <div class="pedido">
      <div class="pedido-info">
        <h4>Orden #12344</h4>
        <p>12 Oct, 2023</p>
        <span class="estado camino">En camino</span>
      </div>

      <div class="pedido-derecha">
        <p class="precio">$89.990</p>
        <button>Ver detalle</button>
      </div>
    </div>

    <!-- PEDIDO 3 -->
    <div class="pedido">
      <div class="pedido-info">
        <h4>Orden #12343</h4>
        <p>05 Oct, 2023</p>
        <span class="estado cancelado">Cancelado</span>
      </div>

      <div class="pedido-derecha">
        <p class="precio">$210.00</p>
        <button>Ver detalle</button>
      </div>
    </div>

  </div>

</main>

</nav>

</body>
</html>
