<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CampusShop - Catálogo</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/responsive.css">
</head>

<body>

<main class="catalogo-container">

<!-- SIDEBAR -->
<aside class="sidebar">
<h2>CampusShop</h2>

<ul>
<li class="activo"><i class="fas fa-border-all"></i> Todos</li>
<li><i class="fas fa-shirt"></i> Blusas</li>
<li><i class="fas fa-user"></i> Pantalones</li>
<li><i class="fas fa-shoe-prints"></i> Zapatillas</li>
<li><i class="fas fa-bag-shopping"></i> Accesorios</li>
<li><i class="fas fa-cart-shopping"></i> Carrito <span class="badge">0</span></li>
</ul>
</aside>

<!-- CONTENIDO -->
<section class="catalogo-content">

<h2>Catálogo de Productos</h2>

<!-- FILTROS -->
<div class="filtros">
<button>Todos</button>
<button>Ofertas</button>
<button>Nuevo</button>
</div>

<!-- GRID DE PRODUCTOS -->
<div class="productos-grid">

<article class="card">
<span class="tag">OFERTA</span>
<img src="img/blusa1.jpeg" alt="">
<h3>Blusa Elegante</h3>
<p>$65.000</p>
</article>

<article class="card">
<img src="img/pantalon1.jpeg" alt="">
<h3>Pantalón Casual</h3>
<p>$89.000</p>
</article>

<article class="card">
<span class="tag">NUEVO</span>
<img src="img/zapatos1.jpeg" alt="">
<h3>Zapatillas Modernas</h3>
<p>$120.000</p>
</article>

<article class="card">
<img src="img/blusa1.jpeg" alt="">
<h3>Blusa Moderna</h3>
<p>$70.000</p>
</article>

<article class="card">
<img src="img/pantalon1.jpeg" alt="">
<h3>Pantalón Negro</h3>
<p>$95.000</p>
</article>

<article class="card">
<img src="img/zapatos1.jpeg" alt="">
<h3>Tacones Altos</h3>
<p>$130.000</p>
</article>

</div>

</section>

</main>

</body>
</html>
